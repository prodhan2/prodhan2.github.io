<!DOCTYPE html>
<html>
<head>
  <title>LED Counter</title>
  <style>
    .counter {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .digit {
      font-size: 5rem;
      font-family: monospace;
      margin: 0 10px;
      padding: 10px;
      background-color: #333;
      color: #ff0;
      border-radius: 5px;
    }
  </style>
</head>
<body>
<div class="counter">
  <div class="digit">0</div>
  <div class="digit">0</div>
  <div class="digit">0</div>
</div>

<script>
  const digitElements = document.querySelectorAll('.digit');
  let counterValue = 0;

  function updateCounter() {
    const counterString = counterValue.toString().padStart(3, '0');
    for (let i = 0; i < 3; i++) {
      digitElements[i].textContent = counterString[i];
    }
  }

  function incrementCounter() {
    counterValue = (counterValue + 1) % 1000;
    updateCounter();
  }

  setInterval(incrementCounter, 1000); // Auto-increment every second
  updateCounter(); // Initialize the counter value
</script>
</body>
</html>
