<!DOCTYPE html>
<html>
<head>
    <title>3D Image Slider</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            perspective: 1000px;
        }

        .slider-container {
            width: 400px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 5s infinite linear;
        }

        .slider-item {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
        }

        .slide1 { background-color: #3498db; transform: rotateY(0deg) translateZ(200px); }
        .slide2 { background-color: #e74c3c; transform: rotateY(60deg) translateZ(200px); }
        .slide3 { background-color: #27ae60; transform: rotateY(120deg) translateZ(200px); }
        .slide4 { background-color: #f1c40f; transform: rotateY(180deg) translateZ(200px); }
        .slide5 { background-color: #9b59b6; transform: rotateY(240deg) translateZ(200px); }
        .slide6 { background-color: #e67e22; transform: rotateY(300deg) translateZ(200px); }

        @keyframes rotate {
            0%, 100% {
                transform: rotateY(0deg);
            }
            16.67% {
                transform: rotateY(-60deg);
            }
            33.33% {
                transform: rotateY(-120deg);
            }
            50% {
                transform: rotateY(-180deg);
            }
            66.67% {
                transform: rotateY(-240deg);
            }
            83.33% {
                transform: rotateY(-300deg);
            }
        }
    </style>
</head>
<body>
<div class="slider-container">
    <div class="slider-item slide1">Slide 1</div>
    <div class="slider-item slide2">Slide 2</div>
    <div class="slider-item slide3">Slide 3</div>
    <div class="slider-item slide4">Slide 4</div>
    <div class="slider-item slide5">Slide 5</div>
    <div class="slider-item slide6">Slide 6</div>
</div>
</body>
</html>
